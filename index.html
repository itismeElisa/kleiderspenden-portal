<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kleiderspenden-Portal</title>

    <!-- Bootstrap CSS via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
          rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">

    <!-- Header -->
    <header class="bg-primary text-white p-3">
        <div class="container d-flex justify-content-between align-items-center">
            <h1 class="h4 mb-0">Kleiderspenden-Portal</h1>
            <img src="https://via.placeholder.com/80x40?text=Logo" 
                 alt="Vereinslogo" 
                 height="40">
        </div>
    </header>

    <!-- Navigation -->
    <nav class="bg-light border-bottom">
        <div class="container">
            <ul class="nav py-2">
                <li class="nav-item">
                    <a class="nav-link active" href="#">Registrierung</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Über uns</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Hauptinhalt -->
    <main class="container my-5 flex-fill">
        <h2 class="mb-4">Registrierung einer Kleiderspende</h2>

    <form id="spendenForm">

        <!-- Auswahl Übergabeart -->
        <div class="mb-3">
            <label class="form-label">Art der Übergabe</label>

            <div class="form-check">
                <input class="form-check-input" type="radio" name="uebergabe"
                       id="vorOrt" value="vorOrt" required>
                <label class="form-check-label" for="vorOrt">
                    Übergabe an der Geschäftsstelle
                </label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="radio" name="uebergabe"
                       id="abholung" value="abholung">
                <label class="form-check-label" for="abholung">
                    Abholung
                </label>
            </div>
        </div>

        <!-- Adressblock (wird später dynamisch angezeigt) -->
        <div class="mb-3" id="adressBlock" style="display:none;">
            <label for="plz" class="form-label">Postleitzahl</label>
            <input type="text" class="form-control" id="plz"
                    maxlength="5" placeholder="z.B. 80331">
                 <div class="invalid-feedback" id="plzError">
                     Bitte geben Sie eine gültige Postleitzahl ein.
                </div>
        </div>

        <!-- Art der Kleidung -->
        <div class="mb-3">
            <label for="kleidung" class="form-label">Art der Kleidung</label>
            <select id="kleidung" class="form-select" required>
                <option value="">Bitte auswählen</option>
                <option>Jacken</option>
                <option>Hosen</option>
                <option>Schuhe</option>
            </select>
        </div>

        <!-- Krisengebiet -->
        <div class="mb-3">
            <label for="krise" class="form-label">Krisengebiet</label>
            <select id="krise" class="form-select" required>
                <option value="">Bitte auswählen</option>
                <option>Region A</option>
                <option>Region B</option>
                <option>Region C</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">
            Registrierung abschließen
        </button>

    </form>
    <div id="bestaetigung" class="mt-5" style="display:none;">
    <h4>Registrierung erfolgreich</h4>
    <div class="alert alert-success">
        <p><strong>Übergabeart:</strong> <span id="confUebergabe"></span></p>
        <p><strong>Postleitzahl:</strong> <span id="confPlz"></span></p>
        <p><strong>Kleidung:</strong> <span id="confKleidung"></span></p>
        <p><strong>Krisengebiet:</strong> <span id="confKrise"></span></p>
    </div>

    <button id="neustartBtn" class="btn btn-secondary mt-3">
    Neue Registrierung starten
    </button>

</div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center p-3 mt-auto">
        <small>
            &copy; 2025 Gemeinnütziger Verein | Impressum | Datenschutz
        </small>
    </footer>

    <!-- Bootstrap JS (optional, für spätere Komponenten hilfreich) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts.js"></script>
    
</body>
</html>
