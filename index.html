<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kleiderspenden-Portal</title>

    <!-- Bootstrap CSS via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
          rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">

    <!-- Header -->
    <header class="bg-primary text-white p-3">
        <div class="container d-flex justify-content-between align-items-center">
            <h1 class="h4 mb-0">Kleiderspenden-Portal</h1>
            <img src="https://via.placeholder.com/80x40?text=Logo" 
                 alt="Vereinslogo" 
                 height="40">
        </div>
    </header>

    <!-- Navigation -->
    <nav class="bg-light border-bottom">
        <div class="container">
            <ul class="nav py-2">
                <li class="nav-item">
                    <a class="nav-link active" href="#">Registrierung</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Über uns</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Hauptinhalt -->
    <main class="container my-5 flex-fill">
        <h2 class="mb-4">Registrierung einer Kleiderspende</h2>

        <p>
            Bitte wählen Sie die gewünschte Übergabeart und geben Sie die 
            erforderlichen Informationen ein.
        </p>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center p-3 mt-auto">
        <small>
            &copy; 2025 Gemeinnütziger Verein | Impressum | Datenschutz
        </small>
    </footer>

    <!-- Bootstrap JS (optional, für spätere Komponenten hilfreich) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
